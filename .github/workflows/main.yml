name: 莊頭北每日巡邏排程

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 打開倉庫拿程式碼
      uses: actions/checkout@v4  # ✨ 這裡升級成 v4 了！

    - name: 準備 Python 工作桌
      uses: actions/setup-python@v5  # ✨ 這裡升級成 v5 了！
      with:
        python-version: '3.10'

    - name: 安裝機器人的工具箱
      run: |
        pip install -r requirements.txt

    - name: 🚀 機器人出動巡邏！
      run: |
        python main.py
