name: 莊頭北每日巡邏排程

on:
  schedule:
    # 這是世界標準時間(UTC)。台灣時間早上 9 點 = UTC 凌晨 1 點
    - cron: '0 1 * * *'
  workflow_dispatch: # 加上這個魔法按鈕，讓老大隨時可以手動按「啟動」

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 打開倉庫拿程式碼
      uses: actions/checkout@v3

    - name: 準備 Python 工作桌
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝機器人的工具箱
      run: |
        pip install -r requirements.txt

    - name: 🚀 機器人出動巡邏！
      run: |
        python main.py
